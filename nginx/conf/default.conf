# Post Rock main site (postrockag.com)
server {
    listen 80;
    listen [::]:80;
    server_name postrockag.com www.postrockag.com _;
    location / {
        proxy_pass http://postrock-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Ghost news subdomain (news.postrockag.com)
# Use CF-Visitor or default to https when behind Cloudflare Tunnel (avoids redirect loop)
map $http_cf_visitor $forwarded_proto {
    default $scheme;
    "~*https" https;
}
server {
    listen 80;
    listen [::]:80;
    server_name news.postrockag.com;

    location / {
        proxy_pass http://ghost:2368;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }
}
